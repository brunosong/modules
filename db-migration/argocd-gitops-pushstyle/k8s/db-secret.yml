apiVersion: v1
kind: Secret
metadata:
  name: db-migration-secret
  namespace: default
type: Opaque
stringData:
  # ──────────────────────────────────────────
  # 로컬 테스트 (Kind + docker-compose-db.yml)
  #   host.docker.internal → K8s 클러스터 밖의 호스트 머신 접근
  # 운영 (NKS)
  #   NCP Cloud DB Private Domain 사용
  # ──────────────────────────────────────────
  # Pod는 IP가 아닌 K8s Service 이름으로 DB에 접근
  # Service(external-mysql)가 Endpoints로 실제 IP를 관리 → ncp-db-service.yml 참고
  DB_HOST: "external-mysql"
  DB_PORT: "3306"        # Service 포트 (컨테이너 간 통신이므로 컨테이너 내부 포트)
  # 운영(NKS): ncp-db-service.yml에서 ExternalName으로 NCP Cloud DB Domain 매핑됨
  # → Pod 코드는 동일하게 external-mysql:3306으로 접근
  DB_NAME: "modules_db"
  DB_USERNAME: "migration"
  DB_PASSWORD: "migration1234"
