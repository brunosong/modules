apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-argocd-job
  namespace: default
  labels:
    app: db-migration
    method: argocd-gitops
  annotations:
    # ArgoCD Sync Hook: Sync 시 자동 실행
    argocd.argoproj.io/hook: Sync
    # Sync 실행 전에 이전 Job을 삭제하고 새로 생성
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      restartPolicy: Never
      containers:
        - name: flyway-migration
          image: brunosong/db-migration-argocd:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: db-migration-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
