kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: argocd-migration

# containerd가 /etc/containerd/certs.d/<registry>/hosts.toml 을
# 레지스트리별 설정으로 읽게 한다.
# → 로컬 레지스트리(localhost:5001 → http://kind-registry:5000) 리다이렉트 구성의 전제.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"

nodes:
  - role: control-plane
    extraPortMappings:
      # ArgoCD UI NodePort 접근용
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
