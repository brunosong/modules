apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: db-migration-helm-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/brunosong/modules.git
    targetRevision: master
    path: db-migration/argocd-helm/helm-chart
    helm:
      # 기본 values.yaml 은 자동으로 읽힘. 추가로 얹을 env 전용 파일만 지정.
      valueFiles:
        - values-dev.yaml
      # values 값을 CLI-style 로 오버라이드 하려면 아래 주석처럼 parameters 사용 가능
      # parameters:
      #   - name: image.tag
      #     value: v1.2.3

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - Replace=true
