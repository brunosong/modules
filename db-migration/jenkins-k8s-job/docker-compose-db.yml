services:

  # ───────────────────────────────────────────────
  # MySQL (K8s 클러스터 외부 - NCP Cloud DB 역할)
  # 쿠버네티스 클러스터와 완전히 분리된 외부 DB
  # ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ncp-cloud-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: modules_db
      MYSQL_USER: migration
      MYSQL_PASSWORD: migration1234
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --bind-address=0.0.0.0

volumes:
  mysql-data:
