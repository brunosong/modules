apiVersion: v1
kind: Secret
metadata:
  name: db-migration-secret
  namespace: default
type: Opaque
stringData:
  # ──────────────────────────────────────────
  # 로컬 테스트 (Kind + docker-compose-db.yml)
  #   host.docker.internal → K8s 클러스터 밖의 호스트 머신 접근
  # 운영 (NKS)
  #   NCP Cloud DB Private Domain 사용
  # ──────────────────────────────────────────
  DB_HOST: "host.docker.internal"                  # 로컬: 호스트의 docker MySQL (3308 포트)
  # DB_HOST: "db-migration-mysql.cdb.ntruss.com"   # 운영: NCP Cloud DB Private Domain
  DB_PORT: "3308"                                  # 로컬: docker-compose-db.yml 포트
  # DB_PORT: "3306"                                # 운영: NCP Cloud DB 기본 포트
  DB_NAME: "modules_db"
  DB_USERNAME: "migration"
  DB_PASSWORD: "migration1234"
