apiVersion: v1
kind: Secret
metadata:
  name: db-migration-secret
  namespace: default
type: Opaque
stringData:
  # Kind 클러스터 내부에서 database 네임스페이스의 MySQL Service에 접근
  DB_HOST: "mysql-service.database.svc.cluster.local"
  DB_PORT: "3306"
  DB_NAME: "modules_db"
  DB_USERNAME: "root"
  DB_PASSWORD: "root"
