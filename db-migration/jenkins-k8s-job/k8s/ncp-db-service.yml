# ──────────────────────────────────────────────────
# 외부 DB를 K8s Service로 추상화
# Pod는 IP가 아닌 Service 이름(external-mysql)으로 접근
# ──────────────────────────────────────────────────

# ──────────────────────────────────────────────────
# 운영 (NKS + NCP Cloud DB): ExternalName 방식
# Service 이름(external-mysql) → NCP DB Private Domain으로 DNS 매핑
# ──────────────────────────────────────────────────
# apiVersion: v1
# kind: Service
# metadata:
#   name: external-mysql
#   namespace: default
# spec:
#   type: ExternalName
#   externalName: db-migration-mysql.cdb.ntruss.com
#   ports:
#     - port: 3306

# ──────────────────────────────────────────────────
# 로컬 (Kind + docker-compose MySQL): Endpoints 직접 지정
# Service 이름(external-mysql) → 호스트의 MySQL IP:PORT로 매핑
# ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: external-mysql
  namespace: default
spec:
  ports:
    - port: 3308          # Service 가상 포트 (Pod에서 호출할 포트)
      targetPort: 3308    # Endpoints의 실제 포트

---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-mysql    # Service와 같은 이름이어야 자동 바인딩됨
  namespace: default
subsets:
  - addresses:
      # 호스트 MySQL의 IP (docker network inspect로 확인한 값)
      - ip: "172.23.0.2"
    ports:
      - port: 3308
