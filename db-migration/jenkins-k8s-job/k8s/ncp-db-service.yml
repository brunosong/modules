# ──────────────────────────────────────────────────
# 외부 DB를 K8s Service로 추상화
# Pod는 IP가 아닌 Service 이름(external-mysql)으로 접근
# ──────────────────────────────────────────────────

# ──────────────────────────────────────────────────
# 운영 (NKS + NCP Cloud DB): ExternalName 방식
# Service 이름(external-mysql) → NCP DB Private Domain으로 DNS 매핑
# ──────────────────────────────────────────────────
# apiVersion: v1
# kind: Service
# metadata:
#   name: external-mysql
#   namespace: default
# spec:
#   type: ExternalName
#   externalName: db-migration-mysql.cdb.ntruss.com
#   ports:
#     - port: 3306

# ──────────────────────────────────────────────────
# 로컬 (Kind + docker-compose MySQL): Endpoints 직접 지정
# 사전 조건: docker network connect kind ncp-cloud-db
# IP 확인:  docker inspect ncp-cloud-db | Select-String IPAddress
# ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: external-mysql
  namespace: default
spec:
  ports:
    - port: 3306          # Pod가 호출하는 포트
      targetPort: 3306    # 실제 DB 포트

---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-mysql    # Service와 같은 이름이어야 자동 바인딩됨
  namespace: default
subsets:
  - addresses:
      - ip: "172.22.0.3"   # kind 네트워크에서의 ncp-cloud-db IP
    ports:
      - port: 3306
