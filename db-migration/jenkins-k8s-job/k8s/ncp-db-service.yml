# ──────────────────────────────────────────────────
# 방법 1: ExternalName (운영 - NCP Cloud DB Domain)
# ──────────────────────────────────────────────────
# apiVersion: v1
# kind: Service
# metadata:
#   name: ncp-mysql
#   namespace: default
# spec:
#   type: ExternalName
#   externalName: db-migration-mysql.cdb.ntruss.com

# ──────────────────────────────────────────────────
# 방법 2: Headless + Endpoints (로컬 - 클러스터 외부 IP 직접 지정)
# Kind 클러스터에서 호스트의 docker-compose MySQL에 접근
# ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: external-mysql
  namespace: default
spec:
  ports:
    - port: 3308
      targetPort: 3308

---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-mysql
  namespace: default
subsets:
  - addresses:
      # Kind 클러스터에서 호스트 머신 접근 시
      # docker network inspect kind 로 Gateway IP 확인 후 입력
      - ip: "172.18.0.1"
    ports:
      - port: 3308
