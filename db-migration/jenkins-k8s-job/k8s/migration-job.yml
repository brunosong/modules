apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-job
  namespace: default
  labels:
    app: db-migration
    method: jenkins-k8s-job
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      restartPolicy: Never
      containers:
        - name: flyway-migration
          image: brunosong/db-migration:latest
          imagePullPolicy: IfNotPresent   # 로컬 Kind: 노드에 이미지 있으면 재사용 (레지스트리 pull 안 함)
          envFrom:
            - secretRef:
                name: db-migration-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
