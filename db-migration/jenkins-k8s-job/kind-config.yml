kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: db-migration
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30306
        hostPort: 30306
        protocol: TCP
# Docker Desktop(Windows/Mac)에서는 host.docker.internal이 자동으로 호스트를 가리킨다.
# Linux에서 Kind를 쓸 경우, docker network inspect kind 로 Gateway IP를 확인하여
# db-secret.yml의 DB_HOST에 직접 입력해야 한다.
