services:

  # ───────────────────────────────────────────────
  # Jenkins (DinD 방식 - Docker 안에서 Docker 사용)
  # ───────────────────────────────────────────────
  jenkins:
    build: ./jenkins
    container_name: jenkins-k8s
    ports:
      - "8080:8080"     # Jenkins UI
      - "50000:50000"   # Jenkins Agent
    environment:
      - DOCKER_HOST=tcp://docker-dind:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins-home:/var/jenkins_home
      - docker-certs:/certs/client:ro
      - ./jenkins-plugins.txt:/usr/share/jenkins/ref/plugins.txt
      - ./kubeconfig:/var/jenkins_home/.kube/config:ro   # Jenkins용 kubeconfig (generate-kubeconfig.cmd로 생성)
    depends_on:
      - docker-dind
    networks:
      - jenkins-net

  # ───────────────────────────────────────────────
  # Docker-in-Docker (Jenkins에서 Docker 빌드용)
  # ───────────────────────────────────────────────
  docker-dind:
    image: docker:dind
    container_name: jenkins-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - docker-certs:/certs/client
      - jenkins-home:/var/jenkins_home
    ports:
      - "2376:2376"
    networks:
      jenkins-net:
        aliases:
          - docker

volumes:
  jenkins-home:
  docker-certs:

networks:
  jenkins-net:
    driver: bridge
