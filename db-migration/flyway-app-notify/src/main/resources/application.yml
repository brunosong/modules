spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:modules_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:migration}
    password: ${DB_PASSWORD:migration1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_app_notify

# 알림 시크릿/정책이 마이그레이션 앱 자체 설정에 들어와 있다는 점이 단점 4번의 본질
notify:
  environment: ${NOTIFY_ENV:dev}
  enabled: ${NOTIFY_ENABLED:false}     # dev 침묵, prod 만 true — 환경 분기를 ENV 로 처리해야 함
  teams-webhook-url: ${TEAMS_WEBHOOK_URL:}
  jira-base-url: ${JIRA_BASE_URL:}
  jira-email: ${JIRA_EMAIL:}
  jira-api-token: ${JIRA_API_TOKEN:}
  jira-issue-key: ${JIRA_ISSUE_KEY:}
  jira-done-transition-id: ${JIRA_DONE_TRANSITION_ID:}