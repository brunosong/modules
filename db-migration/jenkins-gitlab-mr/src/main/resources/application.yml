spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3309}/${DB_NAME:modules_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:migration}
    password: ${DB_PASSWORD:migration1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    # 같은 DB 를 여러 마이그레이션 앱이 공유할 때 history 충돌 방지
    table: flyway_schema_history_jenkins_gitlab_mr
