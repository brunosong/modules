services:

  # ───────────────────────────────────────────────
  # Jenkins
  # ───────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins-direct
    ports:
      - "8081:8080"     # Jenkins UI (다른 모듈과 포트 충돌 방지)
      - "50001:50000"   # Jenkins Agent
    volumes:
      - jenkins-home:/var/jenkins_home
    networks:
      - jenkins-direct-net

  # ───────────────────────────────────────────────
  # MySQL (Jenkins가 직접 접근하는 외부 DB)
  # ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: jenkins-direct-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: modules_db
      MYSQL_USER: migration
      MYSQL_PASSWORD: migration1234
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --bind-address=0.0.0.0
    networks:
      - jenkins-direct-net

volumes:
  jenkins-home:
  mysql-data:

networks:
  jenkins-direct-net:
    driver: bridge
