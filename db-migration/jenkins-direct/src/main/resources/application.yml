spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:modules_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:migration}
    password: ${DB_PASSWORD:migration1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
