spring:
  datasource:
    url: jdbc:mysql://localhost:3306/modules_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/chatting
      - classpath:db/migration/agent
    # 기존 DB에 Flyway 최초 도입 시 baseline 자동 생성
    baseline-on-migrate: true
    # 이미 적용된 SQL 파일 변경 감지 — 반드시 true
    validate-on-migrate: true
    # 여러 팀이 동시 작업 시 타임스탬프 역전 허용
    out-of-order: true
    # DB 전체 삭제 방지 — 절대 false로 바꾸지 말 것
    clean-disabled: true
    # Docker 환경에서 DB 기동 대기
    connect-retries: 3
