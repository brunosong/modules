spring:
  datasource:
    url: jdbc:mysql://localhost:3306/modules_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    # 도메인별 디렉토리를 모두 스캔
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/chatting
      - classpath:db/migration/agent
    baseline-on-migrate: true
    # flyway_schema_history 테이블에 모든 이력이 남음
    table: flyway_schema_history
    # 검증 실패 시 즉시 알림 (PR 리뷰에서 놓친 문제 캐치)
    validate-on-migrate: true
