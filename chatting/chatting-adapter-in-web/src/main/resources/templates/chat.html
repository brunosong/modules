<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>채팅</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 16px; }
        .top { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 18px; }
        #messages {
            border: 1px solid #ddd; border-radius: 6px;
            height: 420px; overflow-y: auto; padding: 12px;
            background: #fafafa; margin-bottom: 12px;
        }
        .msg { padding: 6px 0; }
        .msg .who { font-weight: 600; margin-right: 6px; }
        .me .who   { color: #2b6cb0; }
        .them .who { color: #16a34a; }
        .sys { color: #888; font-style: italic; text-align: center; }
        form { display: flex; gap: 8px; }
        input[type=text] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 18px; border: 0; background: #2b6cb0; color: white; border-radius: 6px; cursor: pointer; }
        button:disabled { background: #999; }
        code { font-size: 11px; color: #888; }
    </style>
</head>
<body>
<div class="top">
    <h1 th:text="${role == 'admin'} ? '상담사 채팅' : '고객 채팅'">채팅</h1>
    <div>
        <span th:text="${name}">name</span> ·
        <code th:text="${roomId}">roomId</code>
    </div>
</div>

<div id="messages"></div>

<form id="form">
    <input type="text" id="input" placeholder="메시지를 입력하세요" autocomplete="off" autofocus />
    <button id="send" type="submit" disabled>전송</button>
</form>

<script th:inline="javascript">
    const myName = /*[[${name}]]*/ 'me';
    const myRole = /*[[${role}]]*/ 'client';
    const roomId = /*[[${roomId}]]*/ '';

    const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://')
        + location.host + '/ws/chat/' + encodeURIComponent(roomId)
        + '?role=' + encodeURIComponent(myRole)
        + '&name=' + encodeURIComponent(myName);

    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const mySenderLabel = (myRole === 'admin') ? '상담사' : myName;

    function append(html, cls) {
        const div = document.createElement('div');
        div.className = 'msg ' + (cls || '');
        div.innerHTML = html;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    const ws = new WebSocket(wsUrl);
    ws.onopen  = () => { sendBtn.disabled = false; };
    ws.onclose = () => { sendBtn.disabled = true; append('연결이 종료되었습니다.', 'sys'); };
    ws.onerror = () => append('연결 오류', 'sys');
    ws.onmessage = (e) => {
        // 서버 형식: "sender|content"
        const idx = e.data.indexOf('|');
        const sender = idx >= 0 ? e.data.substring(0, idx) : '?';
        const content = idx >= 0 ? e.data.substring(idx + 1) : e.data;
        if (sender === 'system') {
            append(escapeHtml(content), 'sys');
        } else {
            const cls = (sender === mySenderLabel) ? 'me' : 'them';
            append('<span class="who">' + escapeHtml(sender) + '</span>' + escapeHtml(content), cls);
        }
    };

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const content = input.value.trim();
        if (!content) return;
        ws.send(content);
        input.value = '';
    });

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
</script>
</body>
</html>
