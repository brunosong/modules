databaseChangeLog:
  - changeSet:
      id: 202604210002-create-chat-room
      author: brunosong
      comment: 채팅방 테이블 생성
      changes:
        - createTable:
            tableName: chat_room
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: chat_room
            indexName: idx_chat_room_created_by
            columns:
              - column:
                  name: created_by
